apiVersion: v1
kind: Service
metadata:
  name: dnscrypt-tcp
  namespace: default
spec:
  ports:
    - protocol: TCP
      port: 443
      targetPort: 443
  selector:
    service: dnscrypt
  type: LoadBalancer
  loadBalancerIP: 34.70.243.74
---
apiVersion: v1
kind: Service
metadata:
  name: dnscrypt-udp
  namespace: default
spec:
  ports:
    - protocol: UDP
      port: 443
      targetPort: 443
  selector:
    service: dnscrypt
  type: LoadBalancer
  loadBalancerIP: 34.70.243.74
